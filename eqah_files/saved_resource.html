<html lang="ms"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Eqah 3/4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff0f5;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
            z-index: 10;
            border: 5px solid #ffb6c1;
        }

        /* Bahagian Gambar */
        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 8px solid #ff69b4;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .date-badge {
            background: #ff69b4;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .heart-main {
            color: #e74c3c;
            font-size: 40px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Love terbang di background */
        .floating-heart {
            position: absolute;
            color: #ffb6c1;
            pointer-events: none;
            z-index: 1;
            animation: moveUp 4s linear forwards;
        }

        @keyframes moveUp {
            from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="date-badge">🗓️ 3 April</div>
        
        <div class="photo-frame">
            <img src="https://www.codechef.com/eqah.jpg" alt="Gambar Eqah">
        </div>

        <h1>Happy Birthday, <br><span style="font-size: 2.5rem;">EQAH!</span></h1>
        <div class="heart-main">❤️</div>
        <p style="color: #666; line-height: 1.6;">
            Semoga menjadi insan yang berbakti kpd ibu&amp;ayah. <br>
            Stay cute and gebu! ✨
        </p>
    </div>

    <script>
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.duration = (Math.random() * 2 + 3) + 's';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        setInterval(createFloatingHeart, 300);
    </script>

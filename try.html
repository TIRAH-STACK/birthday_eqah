<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Eqah 3/4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Pacifico&display=swap');

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: #fff0f5;
        }

        /* FRONT PAGE */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fff5f8 0%, #ffdee9 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; flex-direction: column; cursor: pointer;
            text-align: center;
        }

        .decor {
            position: absolute; font-size: 30px; opacity: 0.6;
            animation: floatAnim 4s infinite ease-in-out;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .gift-box {
            font-size: 80px;
            animation: bounce 1s infinite;
            margin-bottom: 20px;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn-start {
            background: #ff69b4; color: white; border: none;
            padding: 18px 40px; border-radius: 50px;
            font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
            font-family: 'Pacifico', cursive;
        }

        /* KAD UTAMA */
        .card {
            background: white; padding: 35px; border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center; max-width: 320px; width: 85%;
            z-index: 10; border: 10px solid #fff; display: none;
            margin: auto; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .photo-frame {
            width: 160px; height: 160px; margin: 0 auto 20px;
            border-radius: 50%; border: 6px solid #ffb6c1;
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #d63384; font-family: 'Pacifico', cursive; font-size: 2.2rem; margin: 10px 0; }

        .heart-float {
            position: absolute; pointer-events: none;
            z-index: 1; animation: fly 4s linear forwards;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="mula()">
        <div class="decor" style="top:10%; left:10%;">🌸</div>
        <div class="decor" style="top:20%; right:15%;">✨</div>
        <div class="decor" style="bottom:15%; left:20%;">☁️</div>
        <div class="decor" style="bottom:10%; right:10%;">🎀</div>
        
        <div class="gift-box">🎁</div>
        <button class="btn-start">Klik la sini Untuk Suprise Eqah! ❤️</button>
        <p style="margin-top:15px; color:#d63384; font-weight:bold;">BUKAK VOLUME KUAT SIKIT!! 🔊</p>
    </div>

    <audio id="laguBefday" loop>
        <source src="muzik.mp3.mpeg" type="audio/mpeg">
    </audio>

    <div class="card" id="kad">
        <div style="font-size: 0.9rem; color: #ff69b4; font-weight: bold; margin-bottom: 10px;">HAPPY BIRTHDAY 03/04</div>
        <div class="photo-frame">
            <img src="eqah.jpeg" alt="Eqah">
        </div>
        <h1>Eqah ✨</h1>
        <p style="color: #666; font-size: 0.95rem; line-height: 1.5;">
            Semoga Menjadi Insan Yg Berbakti Kpd Keluarga!. Stay gebu & slay  🎂🥳
        </p>
        <div style="font-size: 30px;">💖🌸🍰</div>
    </div>

    <script>
        function mula() {
            var audio = document.getElementById('laguBefday');
            
            // Cuba mainkan audio
            var playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Muzik bermula!");
                }).catch(error => {
                    console.log("Audio gagal dimainkan: " + error);
                });
            }

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('kad').style.display = 'block';
            setInterval(buatLove, 300);
        }

        function buatLove() {
            const icons = ['❤️', '✨', '🌸', '🎀', '🧁'];
            const love = document.createElement('div');
            love.classList.add('heart-float');
            love.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            love.style.left = Math.random() * 100 + 'vw';
            love.style.fontSize = (Math.random() * 20 + 15) + 'px';
            love.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(love);
            setTimeout(() => { love.remove(); }, 4000);
        }
    </script>
</body>
</html>
